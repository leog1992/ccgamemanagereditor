<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gilmer Motors - GD Triple Mirror v3.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --term: #121212; --blue: #33aaff; --green: #5af78e; }
        body { background: var(--bg); font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; overflow: hidden; }
        #window { width: 95%; max-width: 850px; height: 620px; background: var(--term); border: 2px solid var(--blue); border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0, 170, 255, 0.2); }
        .header { background: #222; padding: 12px; border-bottom: 1px solid #333; font-size: 11px; color: #888; font-weight: bold; letter-spacing: 1px; }
        .body { flex: 1; padding: 20px; overflow: hidden; display: flex; flex-direction: column; }
        #history { flex: 1; overflow-y: auto; font-size: 14px; color: var(--blue); margin-bottom: 10px; line-height: 1.5; }
        .input-area { display: flex; border-top: 1px solid #333; padding-top: 12px; }
        #cmd { background: transparent; border: none; color: #fff; outline: none; flex: 1; font-family: inherit; font-size: 14px; }
        .success { color: var(--green); } .error { color: #ff5555; } .info { color: #00ffff; }
        .stat-row { display: grid; grid-template-columns: 200px 100px 150px; border-bottom: 1px solid #222; padding: 5px 0; }
        #file-input { display: none; }
        .btn-download { background: #1a1a1a; border: 1px solid var(--green); color: var(--green); padding: 10px; cursor: pointer; margin-top: 10px; font-family: inherit; transition: 0.3s; }
        .btn-download:hover { background: var(--green); color: #000; }
    </style>
</head>
<body>

<div id="window">
    <div class="header">GILMER MOTORS - GD ENGINE v3.7 [TRIPLE MIRROR MODE]</div>
    <div class="body">
        <div id="history"></div>
        <div class="input-area">
            <span style="color:var(--green); margin-right:10px;">User@nobara:~$</span>
            <input type="text" id="cmd" autofocus spellcheck="false" placeholder="Escribe 'import' para comenzar...">
        </div>
        <button id="multi-save" class="btn-download" style="display:none;">GENERAR TRIPLE RESPALDO (.DAT, .DAT2, .BAK)</button>
    </div>
</div>

<input type="file" id="file-input">

<script>
const historyDiv = document.getElementById('history');
const cmdInput = document.getElementById('cmd');
const fileInput = document.getElementById('file-input');
const saveBtn = document.getElementById('multi-save');

let currentXML = "";
const GD_KEYS = { 'star': '6', 'demon': '5', 'usercoin': '12', 'orb': '14', 'diamond': '13', 'moon': '28', 'secret': '8' };

function addLine(text, cls = '') {
    const div = document.createElement('div');
    div.className = cls; div.innerHTML = text;
    historyDiv.appendChild(div);
    historyDiv.scrollTop = historyDiv.scrollHeight;
}

addLine("<b>[!] TRIPLE MIRROR ACTIVADO</b>", "info");
addLine("Este script descargará 3 archivos idénticos para evitar la autocorrección del juego.");

async function decrypt(file) {
    const ab = await file.arrayBuffer();
    const xor = new Uint8Array(ab).map(b => b ^ 11);
    let b64 = new TextDecoder().decode(xor).replace(/[\s\x00-\x1F\x7F-\x9F]/g, "").replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4 !== 0) b64 += '=';
    const bin = atob(b64);
    const gBytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) gBytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(pako.inflate(gBytes));
}

function updateVal(name, newVal) {
    if(!currentXML) return addLine("ERROR: Archivo no cargado.", "error");
    const id = GD_KEYS[name];
    if(!id) return addLine("ID desconocida.", "error");

    const regex = new RegExp(`(<k>${id}</k><[sir]>)([^<]*)(</[sir]>)`, 'g');
    if(regex.test(currentXML)) {
        currentXML = currentXML.replace(regex, `$1${newVal}$3`);
        addLine(`[OK] ${name.toUpperCase()} actualizado a ${newVal}`, "success");
    } else {
        currentXML = currentXML.replace('<k>GS_value</k><d>', `<k>GS_value</k><d><k>${id}</k><s>${newVal}</s>`);
        addLine(`[!] ID ${id} inyectado.`, "info");
    }
}

function showStats() {
    if(!currentXML) return;
    addLine("<br><b>ESTADÍSTICAS EN MEMORIA:</b>", "info");
    for (const [name, id] of Object.entries(GD_KEYS)) {
        const match = currentXML.match(new RegExp(`<k>${id}</k><[sir]>([^<]*)</[sir]>`));
        const val = match ? match[1] : "---";
        addLine(`<div class="stat-row"><span>${name.toUpperCase()}</span><span>${val}</span><span style="color:#444">ID ${id}</span></div>`);
    }
}

cmdInput.onkeydown = (e) => {
    if (e.key === 'Enter') {
        const raw = cmdInput.value.trim();
        const p = raw.toLowerCase().split(' ');
        addLine(`<span>~$</span> ${raw}`);
        cmdInput.value = '';

        if(p[0] === 'import') fileInput.click();
        else if(p[0] === 'stat') showStats();
        else if(p[0] === 'save') exportAll();
        else if(p.length === 3 && p[1] === 'add') { updateVal(p[0], p[2]); showStats(); }
    }
};

fileInput.onchange = async (e) => {
    try {
        currentXML = await decrypt(e.target.files[0]);
        addLine("SINCRO: Archivo cargado en memoria RAM.", "success");
        saveBtn.style.display = "block";
        showStats();
    } catch(err) { addLine("ERROR: No se pudo descifrar.", "error"); }
};

function downloadBlob(data, fileName) {
    const blob = new Blob([data], {type: 'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 100);
}

function exportAll() {
    if(!currentXML) return;
    try {
        const gzipped = pako.gzip(new TextEncoder().encode(currentXML));
        let binary = '';
        for (let i = 0; i < gzipped.length; i++) binary += String.fromCharCode(gzipped[i]);
        const b64 = btoa(binary).replace(/\+/g, '-').replace(/\//g, '_');
        const final = new Uint8Array(b64.length);
        for (let i = 0; i < b64.length; i++) final[i] = b64.charCodeAt(i) ^ 11;
        
        // Triple descarga con nombres específicos
        addLine("Generando descarga 1/3: CCGameManager.dat...", "info");
        downloadBlob(final, 'CCGameManager.dat');
        
        setTimeout(() => {
            addLine("Generando descarga 2/3: CCGameManager2.dat...", "info");
            downloadBlob(final, 'CCGameManager2.dat');
        }, 1000);

        setTimeout(() => {
            addLine("Generando descarga 3/3: CCGameManager.dat.bak...", "info");
            downloadBlob(final, 'CCGameManager.dat.bak');
            addLine("<b>PROCESO COMPLETADO.</b> Reemplaza los 3 archivos en tu carpeta de Wine.", "success");
        }, 2000);

    } catch(e) { addLine("ERROR AL EXPORTAR.", "error"); }
}

saveBtn.onclick = exportAll;
</script>
</body>
</html>
