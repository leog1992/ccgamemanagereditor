<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gilmer Motors - GD Save Engine v3.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --term: #121212; --blue: #33aaff; --green: #5af78e; }
        body { background: var(--bg); font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; overflow: hidden; }
        #window { width: 90%; max-width: 850px; height: 600px; background: var(--term); border: 2px solid var(--blue); border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0, 170, 255, 0.2); }
        .header { background: #222; padding: 12px; border-bottom: 1px solid #333; font-size: 11px; color: #888; font-weight: bold; letter-spacing: 1px; }
        .body { flex: 1; padding: 20px; overflow: hidden; display: flex; flex-direction: column; }
        #history { flex: 1; overflow-y: auto; font-size: 14px; color: var(--blue); margin-bottom: 10px; line-height: 1.5; }
        .input-area { display: flex; border-top: 1px solid #333; padding-top: 12px; }
        #cmd { background: transparent; border: none; color: #fff; outline: none; flex: 1; font-family: inherit; font-size: 14px; }
        .success { color: var(--green); } .error { color: #ff5555; } .info { color: #00ffff; }
        .stat-row { display: grid; grid-template-columns: 200px 100px 150px; border-bottom: 1px solid #222; padding: 5px 0; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div id="window">
    <div class="header">GILMER MOTORS - GD ENGINE v3.6 (GLOBAL CLEANER MODE)</div>
    <div class="body">
        <div id="history"></div>
        <div class="input-area">
            <span style="color:var(--green); margin-right:10px;">User@nobara:~$</span>
            <input type="text" id="cmd" autofocus spellcheck="false" placeholder="Escribe 'import'...">
        </div>
    </div>
</div>

<input type="file" id="file-input">

<script>
const historyDiv = document.getElementById('history');
const cmdInput = document.getElementById('cmd');
const fileInput = document.getElementById('file-input');

let currentXML = "";

// IDs verificadas en tu entorno Wine/Python
const GD_KEYS = {
    'star': '6', 'demon': '5', 'usercoin': '12', 'orb': '14', 'diamond': '13', 'moon': '28', 'secret': '8'
};

function addLine(text, cls = '') {
    const div = document.createElement('div');
    div.className = cls; div.innerHTML = text;
    historyDiv.appendChild(div);
    historyDiv.scrollTop = historyDiv.scrollHeight;
}

addLine("<b>[SISTEMA OPERATIVO GD]</b> v3.6 - Listo para intervención.", "info");

async function decrypt(file) {
    const ab = await file.arrayBuffer();
    const xor = new Uint8Array(ab).map(b => b ^ 11);
    let b64 = new TextDecoder().decode(xor).replace(/[\s\x00-\x1F\x7F-\x9F]/g, "").replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4 !== 0) b64 += '=';
    const bin = atob(b64);
    const gBytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) gBytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(pako.inflate(gBytes));
}

function updateVal(name, newVal) {
    if(!currentXML) return addLine("ERROR: Archivo no cargado.", "error");
    const id = GD_KEYS[name];
    if(!id) return addLine("ID desconocida.", "error");

    // REEMPLAZO GLOBAL AGRESIVO:
    // Buscamos cualquier <k>ID</k> seguido de cualquier etiqueta de valor y reemplazamos TODO.
    const regex = new RegExp(`(<k>${id}</k><[sir]>)([^<]*)(</[sir]>)`, 'g');
    
    if(regex.test(currentXML)) {
        const matches = currentXML.match(regex).length;
        currentXML = currentXML.replace(regex, `$1${newVal}$3`);
        addLine(`[OK] ${name.toUpperCase()}: ${matches} instancias actualizadas a ${newVal}`, "success");
    } else {
        // Si no existe ni una sola vez, lo forzamos en el bloque GS_value
        const injection = `<k>${id}</k><s>${newVal}</s>`;
        currentXML = currentXML.replace('<k>GS_value</k><d>', `<k>GS_value</k><d>${injection}`);
        addLine(`[!] ${name.toUpperCase()}: No se encontró rastro, inyectando nuevo ID ${id}.`, "info");
    }
}

function showStats() {
    if(!currentXML) return;
    addLine("<br><b>SCANNER DE ESTADÍSTICAS (RAM):</b>", "info");
    for (const [name, id] of Object.entries(GD_KEYS)) {
        // Buscamos la primera ocurrencia para el dashboard
        const match = currentXML.match(new RegExp(`<k>${id}</k><[sir]>([^<]*)</[sir]>`));
        const val = match ? match[1] : "---";
        addLine(`<div class="stat-row"><span>${name.toUpperCase()}</span><span>${val}</span><span style="color:#444">ID ${id}</span></div>`);
    }
}

cmdInput.onkeydown = (e) => {
    if (e.key === 'Enter') {
        const raw = cmdInput.value.trim();
        const p = raw.toLowerCase().split(' ');
        addLine(`<span>~$</span> ${raw}`);
        cmdInput.value = '';

        if(p[0] === 'import') fileInput.click();
        else if(p[0] === 'stat') showStats();
        else if(p[0] === 'save') exportFile();
        else if(p[0] === 'clear') historyDiv.innerHTML = '';
        else if(p.length === 3 && p[1] === 'add') {
            updateVal(p[0], p[2]);
            showStats(); // Verificación inmediata
        }
    }
};

fileInput.onchange = async (e) => {
    try {
        currentXML = await decrypt(e.target.files[0]);
        addLine("SINCRO: Memoria RAM actualizada.", "success");
        showStats();
    } catch(err) { addLine("ERROR: Fallo en el descifrado.", "error"); }
};

function exportFile() {
    if(!currentXML) return;
    try {
        const gzipped = pako.gzip(new TextEncoder().encode(currentXML));
        let binary = '';
        for (let i = 0; i < gzipped.length; i++) binary += String.fromCharCode(gzipped[i]);
        const b64 = btoa(binary).replace(/\+/g, '-').replace(/\//g, '_');
        const final = new Uint8Array(b64.length);
        for (let i = 0; i < b64.length; i++) final[i] = b64.charCodeAt(i) ^ 11;
        
        const blob = new Blob([final], {type: 'application/octet-stream'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'CCGameManager.dat'; a.click();
        addLine("<b>ARCHIVO GENERADO.</b> Reemplázalo y reinicia el juego.", "success");
    } catch(e) { addLine("ERROR AL EXPORTAR.", "error"); }
}
</script>
</body>
</html>
